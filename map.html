<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OpenCivix Platform Map</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson@3"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fa;
    }

    #container {
      display: flex;
      height: 100vh;
    }

    #map {
      flex: 2;
    }

    #sidebar {
      flex: 1;
      background: white;
      border-left: 1px solid #ddd;
      padding: 20px;
    }

    h2 {
      margin-top: 0;
    }

    .country {
      stroke: #fff;
      stroke-width: 0.5;
      cursor: pointer;
    }

    .tooltip {
      position: absolute;
      background: #111;
      color: white;
      padding: 8px;
      font-size: 12px;
      pointer-events: none;
      border-radius: 4px;
    }

    .badge {
      display: inline-block;
      background: #e2e8f0;
      padding: 4px 8px;
      margin: 4px 4px 0 0;
      border-radius: 12px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div id="container">
  <svg id="map"></svg>

  <div id="sidebar">
    <h2 id="country-name">Select a country</h2>
    <p id="region"></p>

    <div id="platforms"></div>

    <p id="notes"></p>
  </div>
</div>

<div class="tooltip" id="tooltip" style="opacity:0;"></div>

<script>

// =======================
// DATA MODEL (EDITABLE)
// =======================

const countryData = {
  USA: {
    country: "United States",
    region: "North America",
    platforms: ["YouTube", "Facebook", "Instagram", "TikTok"],
    notes: "High social media penetration with multi-platform influence."
  },
  BRA: {
    country: "Brazil",
    region: "Latin America",
    platforms: ["WhatsApp", "Instagram", "Facebook", "Telegram"],
    notes: "Messaging platforms dominate political communication."
  },
  IND: {
    country: "India",
    region: "South Asia",
    platforms: ["WhatsApp", "YouTube", "Facebook", "Instagram"],
    notes: "Large-scale messaging influence with video dominance."
  },
  NGA: {
    country: "Nigeria",
    region: "Africa",
    platforms: ["WhatsApp", "Facebook", "TikTok", "YouTube"],
    notes: "High reliance on messaging and mobile-first platforms."
  },
  DEU: {
    country: "Germany",
    region: "Europe",
    platforms: ["WhatsApp", "Instagram", "Facebook", "Telegram"],
    notes: "Strong messaging usage alongside social platforms."
  },
  JPN: {
    country: "Japan",
    region: "East Asia",
    platforms: ["LINE", "YouTube", "Instagram", "X"],
    notes: "LINE is a dominant communication platform."
  }
};

// =======================
// MAP SETUP
// =======================

const width = window.innerWidth * 0.7;
const height = window.innerHeight;

const svg = d3.select("#map")
  .attr("width", width)
  .attr("height", height);

const projection = d3.geoNaturalEarth1()
  .scale(width / 6)
  .translate([width / 2, height / 2]);

const path = d3.geoPath().projection(projection);

const tooltip = d3.select("#tooltip");

// =======================
// LOAD WORLD DATA
// =======================

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
  .then(world => {

    const countries = topojson.feature(world, world.objects.countries).features;

    svg.selectAll("path")
      .data(countries)
      .enter()
      .append("path")
      .attr("d", path)
      .attr("class", "country")
      .attr("fill", "#dbe4ee")

      .on("mouseover", function(event, d) {
        const iso = d.id;
        const data = countryData[iso];

        if (data) {
          tooltip
            .style("opacity", 1)
            .html(`<strong>${data.country}</strong><br>${data.platforms.join(", ")}`);
        }
      })

      .on("mousemove", function(event) {
        tooltip
          .style("left", (event.pageX + 10) + "px")
          .style("top", (event.pageY - 20) + "px");
      })

      .on("mouseout", function() {
        tooltip.style("opacity", 0);
      })

      .on("click", function(event, d) {
        const iso = d.id;
        const data = countryData[iso];

        if (!data) return;

        document.getElementById("country-name").innerText = data.country;
        document.getElementById("region").innerText = data.region;

        const platformsDiv = document.getElementById("platforms");
        platformsDiv.innerHTML = "";

        data.platforms.forEach(p => {
          const span = document.createElement("span");
          span.className = "badge";
          span.innerText = p;
          platformsDiv.appendChild(span);
        });

        document.getElementById("notes").innerText = data.notes;
      });

  });

</script>

</body>
</html>
